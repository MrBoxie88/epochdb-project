<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendors — EpochDB</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
    --gold:#c8a84b;--gold-light:#e8cc7a;--gold-dark:#8a6f2e;--gold-bg:rgba(200,168,75,0.06);
    --bg-deep:#0a0a0c;--bg-panel:#0f0f14;--bg-card:#131318;--bg-hover:#1a1a24;
    --border:#252530;--border-gold:#3a2e10;
    --text:#c8c0a8;--text-dim:#6a6458;--text-bright:#e8dfc8;
    --q2:#1eff00;
}
html{font-size:13px}
body{background:var(--bg-deep);color:var(--text);font-family:'Crimson Text',Georgia,serif;min-height:100vh;overflow-x:hidden}
a{color:var(--gold);text-decoration:none;cursor:pointer}
a:hover{color:var(--gold-light)}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:var(--border-gold);border-radius:2px}
#topbar{background:linear-gradient(180deg,#0d0d10 0%,rgba(10,10,12,.95) 100%);border-bottom:1px solid var(--border-gold);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:200;backdrop-filter:blur(14px);height:52px}
.logo{display:flex;align-items:center;gap:.7rem;flex-shrink:0}
.logo-text{font-family:'Cinzel',serif;font-weight:900;font-size:1.15rem;letter-spacing:.15em;color:var(--gold);text-shadow:0 0 18px rgba(200,168,75,.4);line-height:1}
.logo-sub{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.3em;color:var(--text-dim);margin-top:2px}
#topnav{display:flex;gap:.1rem;margin-left:auto;align-items:center;flex-shrink:0}
.tnav-btn{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;color:var(--text-dim);background:none;border:none;padding:.4rem .75rem;text-transform:uppercase;text-decoration:none;transition:color .15s}
.tnav-btn:hover,.tnav-btn.active{color:var(--gold)}
#mainnav{background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;padding:0 1.5rem;overflow-x:auto;position:relative;z-index:1}
.mnav-tab{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.14em;color:var(--text-dim);background:none;border:none;border-bottom:2px solid transparent;padding:.65rem 1rem;text-transform:uppercase;white-space:nowrap;margin-bottom:-1px;text-decoration:none;display:inline-block;transition:all .15s}
.mnav-tab:hover{color:var(--text)}
.mnav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
#page{max-width:1200px;margin:0 auto;padding:1.2rem 1.5rem;position:relative;z-index:1}
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:.6rem;flex-wrap:wrap}
.list-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--text-bright);display:flex;align-items:center;gap:.5rem}
.list-count{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text-dim);font-weight:400}
.list-controls{display:flex;gap:.4rem;align-items:center}
.list-search{background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-family:'Crimson Text',serif;font-size:.9rem;padding:.35rem .6rem;outline:none;width:220px;transition:border-color .15s}
.list-search:focus{border-color:var(--gold-dark)}
.list-search::placeholder{color:var(--text-dim);font-style:italic}
.list-select{background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.08em;padding:.35rem .6rem;outline:none;cursor:pointer}
.list-body{display:grid;grid-template-columns:188px 1fr;gap:12px;align-items:start}
.filter-panel{background:var(--bg-panel);border:1px solid var(--border);overflow:hidden}
.fp-group{border-bottom:1px solid var(--border)}
.fp-group:last-child{border-bottom:none}
.fp-title{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim);background:var(--bg-card);padding:.45rem .8rem;border-bottom:1px solid rgba(37,37,48,.6)}
.fp-item{display:flex;align-items:center;gap:.5rem;padding:.42rem .8rem;font-size:.88rem;cursor:pointer;transition:background .1s;border-top:1px solid rgba(37,37,48,.3);border-left:2px solid transparent;color:var(--text-dim)}
.fp-item:hover{background:var(--bg-hover);color:var(--text)}
.fp-item.active{color:var(--gold);border-left-color:var(--gold);background:var(--gold-bg)}
.fp-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.data-wrap{background:var(--bg-panel);border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg-card);border-bottom:1px solid var(--border-gold)}
th{padding:.55rem .8rem;text-align:left;font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.18em;color:var(--gold-dark);text-transform:uppercase;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--gold)}
tbody tr{border-bottom:1px solid rgba(37,37,48,.5);transition:background .08s;cursor:pointer}
tbody tr:hover{background:var(--bg-hover)}
tbody tr:last-child{border-bottom:none}
td{padding:.55rem .8rem;font-size:.9rem;vertical-align:middle}
td.mono{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--text-dim)}
.td-name{display:flex;align-items:center;gap:.4rem}
.npc-name{color:#c0392b}
.npc-name:hover{color:#e05555}
.badge{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:.65rem;padding:1px 5px;border-radius:1px;border:1px solid}
.paginator{display:flex;align-items:center;justify-content:center;gap:3px;padding:.7rem;border-top:1px solid var(--border);background:var(--bg-card)}
.pager-btn{background:var(--bg-panel);border:1px solid var(--border);color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.68rem;padding:3px 7px;transition:all .1s}
.pager-btn:hover,.pager-btn.active{background:var(--gold-dark);color:var(--gold-light);border-color:var(--gold-dark)}
</style>
</head>
<body>

<div id="topbar">
  <a class="logo" href="/"><div><div class="logo-text">EPOCHDB</div><div class="logo-sub">Project Epoch Database</div></div></a>
  <div id="topnav">
    <a class="tnav-btn" href="/npcs.html">NPCs</a>
    <a class="tnav-btn" href="/items.html">Items</a>
    <a class="tnav-btn" href="/quests.html">Quests</a>
    <a class="tnav-btn" href="/loot.html">Loot</a>
    <a class="tnav-btn active" href="/vendors.html">Vendors</a>
    <a class="tnav-btn" href="/talents.html">Talents</a>
    <a class="tnav-btn" href="/raid-timers.html">Timers</a>
  </div>
</div>

<div id="mainnav">
  <a class="mnav-tab" href="/">Home</a>
  <a class="mnav-tab" href="/npcs.html">NPCs &amp; Mobs</a>
  <a class="mnav-tab" href="/items.html">Items</a>
  <a class="mnav-tab" href="/quests.html">Quests</a>
  <a class="mnav-tab" href="/loot.html">Loot Tables</a>
  <a class="mnav-tab active" href="/vendors.html">Vendors</a>
  <a class="mnav-tab" href="/talents.html">Talent Calculator</a>
  <a class="mnav-tab" href="/raid-timers.html">Raid Timers</a>
</div>

<div id="page">
  <div class="list-header">
    <div class="list-title">
      🏪 Vendors
      <span class="list-count" id="list-count">(Loading…)</span>
    </div>
    <div class="list-controls">
      <input class="list-search" id="search-input" placeholder="Search vendors…" oninput="onSearch(this.value)">
      <select class="list-select" id="sort-select" onchange="onSort(this.value)">
        <option value="">Sort by…</option>
        <option value="itemCount">Items Sold</option>
        <option value="name">Name</option>
        <option value="zone">Zone</option>
      </select>
      <select class="list-select" id="pagesize-select" onchange="onPageSize(+this.value)">
        <option value="50">50 / page</option>
        <option value="100">100 / page</option>
        <option value="200">200 / page</option>
      </select>
    </div>
  </div>

  <div class="list-body">
    <div class="filter-panel">
      <div class="fp-group">
        <div class="fp-title">Repairs</div>
        <div class="fp-item active" data-field="repairs" data-val="" onclick="setFilter(this)">
          <span class="fp-dot" style="background:#888"></span>All
        </div>
        <div class="fp-item" data-field="repairs" data-val="yes" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--q2)"></span>Can Repair
        </div>
        <div class="fp-item" data-field="repairs" data-val="no" onclick="setFilter(this)">
          <span class="fp-dot" style="background:#888"></span>No Repair
        </div>
      </div>
    </div>

    <div class="data-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="onSort('name')">Vendor</th>
            <th onclick="onSort('zone')">Zone</th>
            <th onclick="onSort('subZone')">Sub-Zone</th>
            <th onclick="onSort('itemCount')">Items</th>
            <th>Repairs</th>
          </tr>
        </thead>
        <tbody id="list-tbody">
          <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-dim);font-style:italic">Loading…</td></tr>
        </tbody>
      </table>
      <div class="paginator" id="paginator"></div>
    </div>
  </div>
</div>

<script>
let allData = [], filtered = [], curPage = 1, pageSize = 50, sortKey = 'itemCount', searchQ = '';
let activeFilters = {};

function fmt(n) { return Number(n).toLocaleString(); }

function setFilter(el) {
    const field = el.dataset.field, val = el.dataset.val;
    document.querySelectorAll(`.fp-item[data-field="${field}"]`).forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    if (val === '') delete activeFilters[field];
    else activeFilters[field] = val;
    curPage = 1; applyAndRender();
}
function onSearch(val) { searchQ = val.toLowerCase(); curPage = 1; applyAndRender(); }
function onSort(key) { if (!key) return; sortKey = key; document.getElementById('sort-select').value = key; applyAndRender(); }
function onPageSize(n) { pageSize = n; curPage = 1; applyAndRender(); }

function applyAndRender() {
    filtered = allData.filter(r => {
        const d = r.data || {};
        if (activeFilters.repairs === 'yes' && !d.canRepair) return false;
        if (activeFilters.repairs === 'no'  &&  d.canRepair) return false;
        if (searchQ) {
            const hay = (r.name + ' ' + (d.zone || '') + ' ' + (d.subZone || '')).toLowerCase();
            if (!hay.includes(searchQ)) return false;
        }
        return true;
    });
    if (sortKey) {
        filtered.sort((a, b) => {
            const ad = a.data || {}, bd = b.data || {};
            if (sortKey === 'itemCount') return (bd.itemCount || 0) - (ad.itemCount || 0);
            if (sortKey === 'zone')    return ((ad.zone || '').localeCompare(bd.zone || ''));
            if (sortKey === 'subZone') return ((ad.subZone || '').localeCompare(bd.subZone || ''));
            return (a.name || '').localeCompare(b.name || '');
        });
    }
    document.getElementById('list-count').textContent = `(${filtered.length} results)`;
    renderPage();
}

function renderPage() {
    const total = Math.ceil(filtered.length / pageSize) || 1;
    if (curPage > total) curPage = total;
    if (curPage < 1) curPage = 1;
    const start = (curPage - 1) * pageSize;
    const rows = filtered.slice(start, start + pageSize);

    document.getElementById('list-tbody').innerHTML = rows.length
        ? rows.map(r => {
            const d = r.data || {};
            const detailUrl = `/?type=vendors&id=${encodeURIComponent(r.id)}`;
            const repairBadge = d.canRepair
                ? `<span class="badge" style="color:var(--q2);border-color:rgba(30,255,0,.3);background:rgba(30,255,0,.06)">✔ Yes</span>`
                : `<span style="color:var(--text-dim);font-size:.82rem">—</span>`;
            return `<tr onclick="window.location='${detailUrl}'">
              <td class="td-name"><span style="margin-right:.3rem">🏪</span><a class="npc-name" href="${detailUrl}" onclick="event.stopPropagation()">${r.name}</a></td>
              <td style="color:var(--text-dim)">${d.zone || '—'}</td>
              <td style="color:var(--text-dim)">${d.subZone || '—'}</td>
              <td class="mono" style="color:var(--gold-dark)">${fmt(d.itemCount || 0)}</td>
              <td>${repairBadge}</td>
            </tr>`;
          }).join('')
        : `<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-dim);font-style:italic">No vendors found — try a different filter or upload your .lua file!</td></tr>`;

    let pag = '';
    if (total > 1) {
        const end = Math.min(start + pageSize, filtered.length);
        pag += `<span style="color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.7rem;margin-right:8px">${start+1}–${end} of ${filtered.length}</span>`;
        pag += btn('«',1,curPage<=1); pag += btn('‹',curPage-1,curPage<=1);
        let ps=Math.max(1,curPage-2),pe=Math.min(total,ps+4); if(pe-ps<4)ps=Math.max(1,pe-4);
        if(ps>1)pag+=`<span style="color:var(--text-dim);padding:0 4px;font-size:.7rem">…</span>`;
        for(let p=ps;p<=pe;p++)pag+=`<button class="pager-btn${p===curPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
        if(pe<total)pag+=`<span style="color:var(--text-dim);padding:0 4px;font-size:.7rem">…</span>`;
        pag+=btn('›',curPage+1,curPage>=total); pag+=btn('»',total,curPage>=total);
    }
    document.getElementById('paginator').innerHTML = pag;
}

function btn(label, page, disabled) {
    return `<button class="pager-btn" onclick="goPage(${page})" ${disabled?'disabled style="opacity:.4;cursor:default"':''}>${label}</button>`;
}
function goPage(p) { curPage = p; renderPage(); window.scrollTo(0,0); }

async function init() {
    try { const res = await fetch('/api/list/vendors'); allData = await res.json(); }
    catch(e) { allData = []; console.warn('Could not load vendors:', e); }
    applyAndRender();
}
init();
</script>
</body>
</html>
