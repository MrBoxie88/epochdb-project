<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPCs &amp; Mobs — EpochDB</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="epochdb.css">
<style>
.badge{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:2px;font-weight:600}
.badge-boss{background:rgba(163,53,238,.18);color:var(--q4);border:1px solid rgba(163,53,238,.35)}
.badge-elite{background:rgba(255,128,0,.14);color:var(--q5);border:1px solid rgba(255,128,0,.3)}
.badge-rare{background:rgba(0,112,221,.16);color:var(--q3);border:1px solid rgba(0,112,221,.32)}
.badge-normal{background:rgba(157,157,157,.12);color:var(--q0);border:1px solid rgba(157,157,157,.25)}
</style>
</head>
<body>

<div id="nav-root"></div>
<script src="nav.js"></script>
<script>renderNav('npcs');</script>

<div id="page">
  <div class="list-header">
    <div class="list-title">
      👹 NPCs &amp; Mobs
      <span class="list-count" id="list-count">(Loading…)</span>
    </div>
    <div class="list-controls">
      <input class="list-search" id="search-input" placeholder="Search NPCs…" oninput="onSearch(this.value)">
      <select class="list-select" id="sort-select" onchange="onSort(this.value)">
        <option value="">Sort by…</option>
        <option value="kills">Kills</option>
        <option value="level">Level</option>
        <option value="name">Name</option>
        <option value="zone">Zone</option>
      </select>
      <select class="list-select" id="pagesize-select" onchange="onPageSize(+this.value)">
        <option value="50">50 / page</option>
        <option value="100">100 / page</option>
        <option value="200">200 / page</option>
      </select>
    </div>
  </div>

  <div class="list-body">
    <button id="filter-toggle" onclick="this.nextElementSibling.classList.toggle('mobile-open');this.textContent=this.nextElementSibling.classList.contains('mobile-open')?'✕ Hide Filters':'⚙ Filters'">⚙ Filters</button>
    <div class="filter-panel">
      <div class="fp-group">
        <div class="fp-title">Type</div>
        <div class="fp-item active" data-field="type" data-val="" onclick="setFilter(this)">
          <span class="fp-dot" style="background:#888"></span>All
        </div>
        <div class="fp-item" data-field="type" data-val="boss" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--q4)"></span>Boss
        </div>
        <div class="fp-item" data-field="type" data-val="elite" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--q5)"></span>Elite
        </div>
        <div class="fp-item" data-field="type" data-val="rare" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--q3)"></span>Rare
        </div>
        <div class="fp-item" data-field="type" data-val="normal" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--q0)"></span>Normal
        </div>
      </div>
    </div>

    <div class="data-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="onSort('name')">Name</th>
            <th onclick="onSort('zone')">Zone</th>
            <th onclick="onSort('level')">Level</th>
            <th onclick="onSort('type')">Type</th>
            <th onclick="onSort('kills')">Kills</th>
          </tr>
        </thead>
        <tbody id="list-tbody">
          <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-dim);font-style:italic">Loading…</td></tr>
        </tbody>
      </table>
      <div class="paginator" id="paginator"></div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="epoch-list.js"></script>
<script>
function fmt(n) { return Number(n).toLocaleString(); }

function normType(t) {
    if (!t) return 'normal';
    const s = t.toLowerCase();
    if (s === 'worldboss' || s === 'boss') return 'boss';
    if (s === 'rareelite') return 'rare';
    if (s === 'elite') return 'elite';
    if (s === 'rare') return 'rare';
    return 'normal';
}

function badgeHtml(t) {
    const n = normType(t);
    const label = n === 'boss' ? 'Boss' : n === 'elite' ? 'Elite' : n === 'rare' ? 'Rare' : 'Normal';
    return `<span class="badge badge-${n}">${label}</span>`;
}

const _epochList = new EpochList({
    containerEl:  document.getElementById('list-tbody'),
    paginatorEl:  document.getElementById('paginator'),
    countEl:      document.getElementById('list-count'),
    sortKey:      'kills',
    colSpan:      5,
    emptyMessage: 'No NPCs found — try a different filter or upload your .lua file!',

    filterFn(r, filters, searchQ) {
        const d = r.data || {};
        if (filters.type != null && normType(d.type) !== filters.type) return false;
        if (searchQ) {
            const hay = (r.name + ' ' + (d.zone || '') + ' ' + (d.subZone || '')).toLowerCase();
            if (!hay.includes(searchQ)) return false;
        }
        return true;
    },

    sortFn(a, b, key) {
        const ad = a.data || {}, bd = b.data || {};
        if (key === 'kills')  return (bd.kills || 0) - (ad.kills || 0);
        if (key === 'level')  return (bd.level || b.level || 0) - (ad.level || a.level || 0);
        if (key === 'zone')   return (ad.zone || '').localeCompare(bd.zone || '');
        if (key === 'type')   return normType(ad.type).localeCompare(normType(bd.type));
        return (a.name || '').localeCompare(b.name || '');
    },

    renderRowFn(r) {
        const d = r.data || {};
        const lvl  = d.level || r.level || '—';
        const zone = d.zone || '—';
        const kills = d.kills || 0;
        const detailUrl = `/?type=npcs&id=${encodeURIComponent(r.id)}`;
        return `<tr onclick="window.location='${detailUrl}'">
          <td><a class="npc-name" href="${detailUrl}" onclick="event.stopPropagation()">${r.name || 'Unknown'}</a></td>
          <td style="color:var(--text)">${zone}</td>
          <td class="mono">${lvl}</td>
          <td>${badgeHtml(d.type)}</td>
          <td class="mono" style="color:var(--gold-dark)">${fmt(kills)}</td>
        </tr>`;
    },
});

function setFilter(el) { el.classList.add('active'); _epochList.setFilter(el.dataset.field, el.dataset.val); }
function onSearch(val)  { _epochList.setSearch(val); }
function onSort(key)    { _epochList.setSort(key); }
function onPageSize(n)  { _epochList.setPageSize(n); }

async function init() {
    try { _epochList.load(await listNpcs()); }
    catch(e) { console.warn('Could not load NPCs:', e); _epochList.load([]); }
}
init();
</script>

<div id="footer">
  <span class="footer-character">Cococat</span> · Gurubashi
</div>
</body>
</html>
