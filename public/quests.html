<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quests — EpochDB</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="epochdb.css">
<style>
:root{--orange-light:#e8a84a;--blue-light:#6ab4e8}
.badge-daily{color:var(--gold);border-color:var(--border-gold);background:var(--gold-bg)}
.badge-raid{color:#e07070;border-color:rgba(204,51,51,.3);background:rgba(139,26,26,.15)}
.badge-dungeon{color:var(--blue-light);border-color:rgba(74,143,191,.3);background:rgba(74,143,191,.08)}
.badge-elite2{color:var(--orange-light);border-color:rgba(232,168,74,.3);background:rgba(232,168,74,.07)}
.badge-solo{color:var(--text-dim);border-color:var(--border);background:transparent}
</style>
</head>
<body>

<div id="nav-root"></div>
<script src="nav.js"></script>
<script>renderNav('quests');</script>

<div id="page">
  <div class="list-header">
    <div class="list-title">
      📜 Quests
      <span class="list-count" id="list-count">(Loading…)</span>
    </div>
    <div class="list-controls">
      <input class="list-search" id="search-input" placeholder="Search quests…" oninput="onSearch(this.value)">
      <select class="list-select" id="sort-select" onchange="onSort(this.value)">
        <option value="">Sort by…</option>
        <option value="completions">Completions</option>
        <option value="name">Name</option>
      </select>
      <select class="list-select" id="pagesize-select" onchange="onPageSize(+this.value)">
        <option value="50">50 / page</option>
        <option value="100">100 / page</option>
        <option value="200">200 / page</option>
      </select>
    </div>
  </div>

  <div class="list-body">
    <button id="filter-toggle" onclick="this.nextElementSibling.classList.toggle('mobile-open');this.textContent=this.nextElementSibling.classList.contains('mobile-open')?'✕ Hide Filters':'⚙ Filters'">⚙ Filters</button>
    <div class="filter-panel">
      <div class="fp-group">
        <div class="fp-title">Type</div>
        <div class="fp-item active" data-field="type" data-val="" onclick="setFilter(this)">
          <span class="fp-dot" style="background:#888"></span>All
        </div>
        <div class="fp-item" data-field="type" data-val="daily" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--gold)"></span>Daily
        </div>
        <div class="fp-item" data-field="type" data-val="raid" onclick="setFilter(this)">
          <span class="fp-dot" style="background:#e07070"></span>Raid
        </div>
        <div class="fp-item" data-field="type" data-val="dungeon" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--blue-light)"></span>Dungeon
        </div>
        <div class="fp-item" data-field="type" data-val="elite2" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--orange-light)"></span>Elite
        </div>
        <div class="fp-item" data-field="type" data-val="solo" onclick="setFilter(this)">
          <span class="fp-dot" style="background:#888"></span>Solo
        </div>
      </div>
    </div>

    <div class="data-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="onSort('name')">Quest</th>
            <th onclick="onSort('questId')">Quest ID</th>
            <th onclick="onSort('zone')">Zone</th>
            <th>Type</th>
            <th onclick="onSort('completions')">Completions</th>
          </tr>
        </thead>
        <tbody id="list-tbody">
          <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-dim);font-style:italic">Loading…</td></tr>
        </tbody>
      </table>
      <div class="paginator" id="paginator"></div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
let activeFilters = {};

function fmt(n) { return Number(n).toLocaleString(); }

function setFilter(el) {
    const field = el.dataset.field, val = el.dataset.val;
    document.querySelectorAll(`.fp-item[data-field="${field}"]`).forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    if (val === '') delete activeFilters[field];
    else activeFilters[field] = val;
    curPage = 1; applyAndRender();
}
function onSearch(val) { searchQ = val.toLowerCase(); curPage = 1; applyAndRender(); }
function onSort(key) { if (!key) return; sortKey = key; document.getElementById('sort-select').value = key; applyAndRender(); }
function onPageSize(n) { pageSize = n; curPage = 1; applyAndRender(); }

function getType(r) { return (r.data && r.data.type) || ''; }

function applyAndRender() {
    filtered = allData.filter(r => {
        if (activeFilters.type) { if (getType(r) !== activeFilters.type) return false; }
        if (searchQ) {
            const hay = (r.name + ' ' + ((r.data && r.data.zone) || '') + ' ' + ((r.data && r.data.questId) || '')).toLowerCase();
            if (!hay.includes(searchQ)) return false;
        }
        return true;
    });
    if (sortKey) {
        filtered.sort((a, b) => {
            let av, bv;
            if (sortKey === 'completions') { av = (a.data && a.data.completions) || 0; bv = (b.data && b.data.completions) || 0; return bv - av; }
            if (sortKey === 'questId')     { av = (a.data && a.data.questId) || a.id || ''; bv = (b.data && b.data.questId) || b.id || ''; }
            if (sortKey === 'zone')        { av = (a.data && a.data.zone) || ''; bv = (b.data && b.data.zone) || ''; }
            else { av = a.name || ''; bv = b.name || ''; }
            return String(av).localeCompare(String(bv));
        });
    }
    document.getElementById('list-count').textContent = `(${filtered.length} results)`;
    renderPage();
}

const TYPE_BADGE = {
    daily: 'badge-daily', raid: 'badge-raid', dungeon: 'badge-dungeon',
    elite2: 'badge-elite2', solo: 'badge-solo'
};
function typeBadge(t) {
    if (!t) return '<span style="color:var(--text-dim);font-size:.82rem">—</span>';
    const cls = TYPE_BADGE[t] || 'badge-solo';
    return `<span class="badge ${cls}">${t.charAt(0).toUpperCase() + t.slice(1)}</span>`;
}

function renderPage() {
    const total = Math.ceil(filtered.length / pageSize) || 1;
    if (curPage > total) curPage = total;
    if (curPage < 1) curPage = 1;
    const start = (curPage - 1) * pageSize;
    const rows = filtered.slice(start, start + pageSize);

    document.getElementById('list-tbody').innerHTML = rows.length
        ? rows.map(r => {
            const d = r.data || {};
            const qid = d.questId || r.id || '—';
            const zone = d.zone || '—';
            const t = getType(r);
            const completions = fmt(d.completions || 0);
            const detailUrl = `/?type=quests&id=${encodeURIComponent(r.id)}`;
            return `<tr onclick="window.location='${detailUrl}'">
              <td class="td-name"><a href="${detailUrl}" onclick="event.stopPropagation()">${r.name}</a></td>
              <td class="mono">${qid}</td>
              <td style="color:var(--text-dim)">${zone}</td>
              <td>${typeBadge(t)}</td>
              <td class="mono" style="color:var(--gold-dark)">${completions}</td>
            </tr>`;
          }).join('')
        : `<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-dim);font-style:italic">No quests found — try a different filter or upload your .lua file!</td></tr>`;

    let pag = '';
    if (total > 1) {
        const end = Math.min(start + pageSize, filtered.length);
        pag += `<span style="color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.7rem;margin-right:8px">${start+1}–${end} of ${filtered.length}</span>`;
        pag += btn('«',1,curPage<=1); pag += btn('‹',curPage-1,curPage<=1);
        let ps=Math.max(1,curPage-2),pe=Math.min(total,ps+4); if(pe-ps<4)ps=Math.max(1,pe-4);
        if(ps>1)pag+=`<span style="color:var(--text-dim);padding:0 4px;font-size:.7rem">…</span>`;
        for(let p=ps;p<=pe;p++)pag+=`<button class="pager-btn${p===curPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
        if(pe<total)pag+=`<span style="color:var(--text-dim);padding:0 4px;font-size:.7rem">…</span>`;
        pag+=btn('›',curPage+1,curPage>=total); pag+=btn('»',total,curPage>=total);
    }
    document.getElementById('paginator').innerHTML = pag;
}

function btn(label, page, disabled) {
    return `<button class="pager-btn" onclick="goPage(${page})" ${disabled?'disabled style="opacity:.4;cursor:default"':''}>${label}</button>`;
}
function goPage(p) { curPage = p; renderPage(); window.scrollTo(0,0); }

async function init() {
    try { allData = await listQuests(); }
    catch(e) { allData = []; console.warn('Could not load quests:', e); }
    applyAndRender();
}
init();
</script>

<div id="footer">
  <span class="footer-character">Cococat</span> · Gurubashi
</div>
</body>
</html>
