<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loot Tables — EpochDB</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="epochdb.css">
<style>
.rate-wrap{display:flex;align-items:center;gap:6px}
.rate-bar{flex:1;height:5px;background:var(--bg-card);border-radius:2px;overflow:hidden;min-width:60px}
.rate-fill{height:100%;border-radius:2px;background:var(--gold-dark)}
.rate-fill.fill-epic{background:var(--q4)}
.rate-fill.fill-rare{background:var(--q3)}
.rate-fill.fill-leg{background:var(--q5)}
.rate-text{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--text-dim);min-width:40px;text-align:right}
</style>
</head>
<body>

<div id="nav-root"></div>
<script src="nav.js"></script>
<script>renderNav('loot');</script>

<div id="page">
  <div class="list-header">
    <div class="list-title">
      💰 Loot Tables
      <span class="list-count" id="list-count">(Loading…)</span>
    </div>
    <div class="list-controls">
      <input class="list-search" id="search-input" placeholder="Search loot…" oninput="onSearch(this.value)">
      <select class="list-select" id="sort-select" onchange="onSort(this.value)">
        <option value="">Sort by…</option>
        <option value="rate">Drop Rate</option>
        <option value="drops">Drops</option>
        <option value="name">Name</option>
      </select>
      <select class="list-select" id="pagesize-select" onchange="onPageSize(+this.value)">
        <option value="50">50 / page</option>
        <option value="100">100 / page</option>
        <option value="200">200 / page</option>
      </select>
    </div>
  </div>

  <div class="list-body">
    <button id="filter-toggle" onclick="this.nextElementSibling.classList.toggle('mobile-open');this.textContent=this.nextElementSibling.classList.contains('mobile-open')?'✕ Hide Filters':'⚙ Filters'">⚙ Filters</button>
    <div class="filter-panel">
      <div class="fp-group">
        <div class="fp-title">Quality</div>
        <div class="fp-item active" data-field="quality" data-val="" onclick="setFilter(this)">
          <span class="fp-dot" style="background:#888"></span>All
        </div>
        <div class="fp-item" data-field="quality" data-val="5" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--q5)"></span>Legendary
        </div>
        <div class="fp-item" data-field="quality" data-val="4" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--q4)"></span>Epic
        </div>
        <div class="fp-item" data-field="quality" data-val="3" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--q3)"></span>Rare
        </div>
        <div class="fp-item" data-field="quality" data-val="2" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--q2)"></span>Uncommon
        </div>
        <div class="fp-item" data-field="quality" data-val="1" onclick="setFilter(this)">
          <span class="fp-dot" style="background:var(--q1)"></span>Common
        </div>
      </div>
    </div>

    <div class="data-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="onSort('name')">Item</th>
            <th onclick="onSort('source')">Source</th>
            <th onclick="onSort('quality')">Quality</th>
            <th onclick="onSort('rate')">Drop Rate</th>
            <th onclick="onSort('drops')">Drops</th>
            <th onclick="onSort('samples')">Samples</th>
          </tr>
        </thead>
        <tbody id="list-tbody">
          <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-dim);font-style:italic">Loading…</td></tr>
        </tbody>
      </table>
      <div class="paginator" id="paginator"></div>
    </div>
  </div>
</div>

<script src="utils.js"></script>
<script src="api.js"></script>
<script src="epoch-list.js"></script>
<script>
const Q    = ['Poor','Common','Uncommon','Rare','Epic','Legendary','Artifact'];

function pct(r) { return (r * 100).toFixed(2) + '%'; }
function bestRate(d) {
    const sources = d.sources || {};
    const vals    = Object.values(sources);
    const samples = d.samples || 0;
    if (samples > 0 && vals.length > 0) return Math.max(...vals.map(c => c / samples));
    return samples > 0 ? (d.drops || 0) / samples : 0;
}

const _epochList = new EpochList({
    containerEl:  document.getElementById('list-tbody'),
    paginatorEl:  document.getElementById('paginator'),
    countEl:      document.getElementById('list-count'),
    sortKey:      'rate',
    colSpan:      6,
    emptyMessage: 'No loot found — try a different filter or upload your .lua file!',

    filterFn(r, filters, searchQ) {
        if (filters.quality != null && r.quality !== filters.quality) return false;
        if (searchQ) {
            const hay = (r.name + ' ' + ((r.data && r.data.source) || '')).toLowerCase();
            if (!hay.includes(searchQ)) return false;
        }
        return true;
    },

    sortFn(a, b, key) {
        const ad = a.data || {}, bd = b.data || {};
        if (key === 'rate')    return bestRate(bd) - bestRate(ad);
        if (key === 'drops')   return (bd.drops   || 0) - (ad.drops   || 0);
        if (key === 'samples') return (bd.samples || 0) - (ad.samples || 0);
        if (key === 'quality') return (b.quality  || 0) - (a.quality  || 0);
        if (key === 'source')  return (ad.source  || '').localeCompare(bd.source || '');
        return (a.name || '').localeCompare(b.name || '');
    },

    renderRowFn(r) {
        const d       = r.data || {};
        const q       = r.quality || 0;
        const qcls    = qualityColor(q);
        const rate    = bestRate(d);
        const fillCls = q >= 5 ? 'fill-leg' : q >= 4 ? 'fill-epic' : q >= 3 ? 'fill-rare' : '';
        const detailUrl = `/?type=loot&id=${encodeURIComponent(r.id)}`;
        return `<tr onclick="window.location='${detailUrl}'">
          <td class="td-name">${iconImg(d.icon)}<a class="${qcls}" href="${detailUrl}" onclick="event.stopPropagation()">${r.name || 'Unknown'}</a></td>
          <td><a class="npc-name">${d.source || '—'}</a></td>
          <td class="${qcls}">${Q[q]}</td>
          <td style="min-width:130px"><div class="rate-wrap"><div class="rate-bar"><div class="rate-fill ${fillCls}" style="width:${Math.min(rate * 100, 100)}%"></div></div><span class="rate-text">${pct(rate)}</span></div></td>
          <td class="mono" style="color:var(--gold-dark)">${fmt(d.drops || 0)}</td>
          <td class="mono">${fmt(d.samples || 0)}</td>
        </tr>`;
    },
});

function setFilter(el) { el.classList.add('active'); _epochList.setFilter(el.dataset.field, el.dataset.val); }
function onSearch(val)  { _epochList.setSearch(val); }
function onSort(key)    { _epochList.setSort(key); }
function onPageSize(n)  { _epochList.setPageSize(n); }

async function init() {
    try { _epochList.load(await listLoot()); }
    catch(e) { console.warn('Could not load loot:', e); _epochList.load([]); }
}
init();
</script>

<div id="footer">
  <span class="footer-character">Cococat</span> · Gurubashi
</div>
</body>
</html>
