<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent Calculator — EpochDB</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
:root {
  --gold:#c8a84b; --gold-light:#e8cc7a; --gold-dark:#8a6f2e; --gold-bg:rgba(200,168,75,0.06);
  --red:#8b1a1a; --red-bright:#c0392b;
  --bg-deep:#0a0a0c; --bg-panel:#0f0f14; --bg-card:#131318; --bg-hover:#1a1a24;
  --border:#252530; --border-gold:#3a2e10;
  --text:#c8c0a8; --text-dim:#6a6458; --text-bright:#e8dfc8;
  --green:#1eff00; --green-soft:#6abf6a;
  --accent:#5865f2;
}
html { font-size:13px }
body { background:var(--bg-deep); color:var(--text); font-family:'Crimson Text',Georgia,serif; min-height:100vh; overflow-x:hidden }
body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; opacity:.4 }
a { color:var(--gold); text-decoration:none; cursor:pointer }
a:hover { color:var(--gold-light); text-decoration:underline }
button { cursor:pointer; font-family:inherit }
::-webkit-scrollbar { width:5px; height:5px }
::-webkit-scrollbar-track { background:var(--bg-deep) }
::-webkit-scrollbar-thumb { background:var(--border-gold); border-radius:2px }

/* ── TOPBAR ── */
#topbar { background:linear-gradient(180deg,#0d0d10 0%,rgba(10,10,12,.95) 100%); border-bottom:1px solid var(--border-gold); padding:0 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:200; backdrop-filter:blur(14px); height:52px }
.logo { display:flex; align-items:center; gap:.7rem; flex-shrink:0; cursor:pointer; text-decoration:none }
.logo:hover { text-decoration:none }
.logo-icon { width:36px; height:36px }
.logo-icon svg { width:100%; height:100% }
.logo-text { font-family:'Cinzel',serif; font-weight:900; font-size:1.15rem; letter-spacing:.15em; color:var(--gold); text-shadow:0 0 18px rgba(200,168,75,.4); line-height:1 }
.logo-sub { font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.3em; color:var(--text-dim); margin-top:2px }
#topnav { display:flex; gap:.1rem; margin-left:auto; align-items:center; flex-shrink:0 }
.tnav-btn { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.12em; color:var(--text-dim); background:none; border:none; padding:.4rem .75rem; transition:color .15s; text-transform:uppercase; text-decoration:none }
.tnav-btn:hover, .tnav-btn.active { color:var(--gold); text-decoration:none }

/* ── MAIN NAV ── */
#mainnav { background:var(--bg-panel); border-bottom:1px solid var(--border); display:flex; padding:0 1.5rem; gap:0; overflow-x:auto; position:relative; z-index:1 }
.mnav-tab { font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.14em; color:var(--text-dim); background:none; border:none; border-bottom:2px solid transparent; padding:.65rem 1rem; text-transform:uppercase; transition:all .15s; white-space:nowrap; margin-bottom:-1px; text-decoration:none; display:inline-block }
.mnav-tab:hover { color:var(--text); text-decoration:none }
.mnav-tab.active { color:var(--gold); border-bottom-color:var(--gold) }

/* ── PAGE WRAP ── */
#page { max-width:1200px; margin:0 auto; padding:0 1.5rem; position:relative; z-index:1 }

/* ── HERO ── */
.hero { text-align:center; padding:1.8rem 0 1.2rem; position:relative }
.hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(139,26,26,.12) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 50% 100%,rgba(200,168,75,.05) 0%,transparent 70%); pointer-events:none }
.hero-title { font-family:'Cinzel',serif; font-size:clamp(1.6rem,3.5vw,2.4rem); font-weight:900; color:var(--gold); text-shadow:0 0 36px rgba(200,168,75,.3),0 2px 0 rgba(0,0,0,.8); letter-spacing:.08em; line-height:1; position:relative }
.hero-sub { color:var(--text-dim); font-style:italic; font-size:1rem; margin-top:.4rem; position:relative }
.hero-divider { width:260px; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dark),var(--gold),var(--gold-dark),transparent); margin:.8rem auto; position:relative }
.hero-divider::before { content:'⚔'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--gold); font-size:.9rem; background:var(--bg-deep); padding:0 .5rem }

/* ── CLASS BAR ── */
.class-bar { display:flex; justify-content:center; gap:8px; padding:1rem 12px; flex-wrap:wrap }
.class-btn { width:48px; height:48px; border:2px solid var(--border); cursor:pointer; overflow:hidden; transition:all .2s; background:var(--bg-card) }
.class-btn img { width:100%; height:100%; display:block }
.class-btn:hover { border-color:var(--gold-dark); background:var(--bg-hover) }
.class-btn.active { border-color:var(--gold); box-shadow:0 0 12px rgba(200,168,75,.35) }

/* ── CONTROLS ── */
.controls { display:flex; justify-content:center; align-items:center; gap:16px; padding:.7rem 1rem; background:var(--bg-panel); border:1px solid var(--border); border-top:none; flex-wrap:wrap; margin-bottom:1rem }
.controls .class-name { font-family:'Cinzel',serif; font-size:1.1rem; font-weight:700; min-width:120px; text-align:center }
.controls .points-display { font-family:'Share Tech Mono',monospace; font-size:.8rem; color:var(--text-dim) }
.controls .points-display span { color:var(--gold); font-weight:700 }
.btn { background:var(--bg-card); color:var(--text-dim); border:1px solid var(--border); padding:.4rem 1rem; font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:all .15s }
.btn:hover { border-color:var(--gold-dark); color:var(--gold) }
.btn.share-btn { border-color:var(--border-gold); color:var(--gold-dark) }
.btn.share-btn:hover { background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:var(--bg-deep); border-color:var(--gold) }

/* ── TREES ── */
.trees-wrap { display:flex; justify-content:center; gap:12px; padding:0 0 2rem; flex-wrap:wrap }
.tree-panel { background:var(--bg-panel); border:1px solid var(--border); overflow:hidden; flex:1; min-width:280px; max-width:380px; position:relative }
.tree-header { text-align:center; padding:.55rem .9rem; background:var(--bg-card); border-bottom:1px solid var(--border) }
.tree-header .tree-name { font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.18em; text-transform:uppercase; color:var(--text-bright) }
.tree-header .tree-icon { width:20px; height:20px; vertical-align:middle; margin-right:6px; border-radius:2px; border:1px solid rgba(255,255,255,.1) }
.tree-header .tree-points { font-family:'Share Tech Mono',monospace; font-size:.7rem; color:var(--text-dim); margin-top:2px }
.tree-body { padding:14px; position:relative; background-size:cover; background-position:center top; background-repeat:no-repeat }
.tree-body::before { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(10,10,12,0.3) 0%,rgba(15,15,20,0.75) 100%); z-index:1; pointer-events:none }
.tree-grid { display:grid; grid-template-columns:repeat(4,48px); grid-auto-rows:48px; gap:8px; justify-content:center; position:relative; z-index:2 }
.tree-arrows { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none }
.talent-cell { position:relative }
.talent { width:48px; height:48px; border:2px solid var(--border); cursor:pointer; overflow:hidden; position:relative; transition:border-color .2s,filter .2s; background:var(--bg-deep) }
.talent img { width:100%; height:100%; display:block }
.talent.locked { filter:grayscale(1) brightness(0.4); border-color:#1a1a1a; cursor:not-allowed }
.talent.available { border-color:#3a3a3a; filter:brightness(0.85) }
.talent.available:hover { border-color:var(--gold-dark); filter:brightness(1) }
.talent.has-points { border-color:var(--green-soft); filter:none; box-shadow:0 0 6px rgba(106,191,106,.2) }
.talent.has-points:hover { border-color:var(--green); box-shadow:0 0 10px rgba(30,255,0,.2) }
.talent.maxed { border-color:var(--gold); filter:none; box-shadow:0 0 10px rgba(200,168,75,.3) }
.talent-rank { position:absolute; bottom:-1px; right:-1px; background:rgba(0,0,0,.9); color:var(--green-soft); font-family:'Share Tech Mono',monospace; font-size:.65rem; padding:1px 4px; pointer-events:none }
.talent.maxed .talent-rank { color:var(--gold) }
.coming-soon { text-align:center; padding:40px 10px; color:var(--text-dim); font-style:italic; font-size:.88rem; position:relative; z-index:2 }

/* ── TOOLTIP ── */
.talent-tooltip { position:fixed; background:#0a0a12; border:1px solid #4a3a1a; max-width:280px; pointer-events:none; z-index:9999; display:none; box-shadow:inset 0 0 0 1px #1a1428,0 0 0 1px #000,0 4px 24px rgba(0,0,0,.8); filter:drop-shadow(0 4px 24px rgba(0,0,0,.9)) }
.talent-tooltip::before, .talent-tooltip::after { content:''; position:absolute; width:6px; height:6px; border-color:var(--gold-dark); border-style:solid; z-index:1 }
.talent-tooltip::before { top:-1px; left:-1px; border-width:2px 0 0 2px }
.talent-tooltip::after { bottom:-1px; right:-1px; border-width:0 2px 2px 0 }
.tt-inner { padding:8px 10px }
.talent-tooltip .tt-name { font-family:'Cinzel',serif; font-size:.9rem; color:var(--gold); margin-bottom:4px; font-weight:600 }
.talent-tooltip .tt-rank { font-family:'Share Tech Mono',monospace; font-size:.7rem; color:var(--text-dim); margin-bottom:6px }
.talent-tooltip .tt-desc { font-size:.85rem; color:var(--text); line-height:1.4 }
.talent-tooltip .tt-next { font-size:.8rem; color:var(--green); margin-top:6px; border-top:1px solid var(--border); padding-top:6px }
.talent-tooltip .tt-req { font-size:.75rem; color:var(--red-bright); margin-top:4px }
.talent-tooltip .tt-hint { font-size:.7rem; color:var(--text-dim); margin-top:6px; font-style:italic }
.talent-tooltip .tt-sep { height:1px; background:linear-gradient(90deg,transparent,#4a3a1a 20%,#6a5a2a 50%,#4a3a1a 80%,transparent); margin:5px 0 }

/* ── SHARE MODAL ── */
.share-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:10000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px) }
.share-overlay.open { display:flex }
.share-box { background:var(--bg-panel); border:1px solid var(--border-gold); width:90%; max-width:500px; box-shadow:0 0 60px rgba(200,168,75,.1),0 0 120px rgba(0,0,0,.6) }
.share-box-hdr { background:linear-gradient(135deg,rgba(139,26,26,.3),rgba(200,168,75,.08)); border-bottom:1px solid var(--border-gold); padding:.9rem 1.2rem; display:flex; justify-content:space-between; align-items:center }
.share-box-hdr h3 { font-family:'Cinzel',serif; font-size:.82rem; letter-spacing:.14em; color:var(--gold); margin:0 }
.share-box-body { padding:1.2rem }
.share-box input { width:100%; padding:.6rem .8rem; background:var(--bg-card); color:var(--text); border:1px solid var(--border); font-family:'Share Tech Mono',monospace; font-size:.8rem; margin-bottom:.8rem; outline:none }
.share-box input:focus { border-color:var(--gold-dark) }
.share-box .btn-row { display:flex; gap:8px; justify-content:center }

/* ── TOAST ── */
.toast { position:fixed; bottom:1.5rem; right:1.5rem; background:var(--bg-panel); border:1px solid var(--border-gold); border-left:3px solid var(--gold); padding:.7rem 1.1rem; font-size:.88rem; color:var(--text-bright); z-index:600; box-shadow:0 4px 20px rgba(0,0,0,.5); animation:slideIn .25s ease }
@keyframes slideIn { from{transform:translateX(110%);opacity:0} to{transform:none;opacity:1} }

@media(max-width:768px) {
  .trees-wrap { gap:8px }
  .tree-panel { min-width:260px }
}
</style>
</head>

let currentClass='warrior';
let pointsSpent=[];

function init(){
  const hash=location.hash.slice(1);
  if(hash){
    const parts=hash.split('-');
    if(CLASS_DATA[parts[0]]){currentClass=parts[0];}
  }
  renderClassBar();
  loadClass(currentClass);
  window.addEventListener('hashchange',()=>{
    const h=location.hash.slice(1);
    if(h){const p=h.split('-');if(CLASS_DATA[p[0]]&&p[0]!==currentClass){currentClass=p[0];loadClass(currentClass);}}
  });
}

function renderClassBar(){
  const bar=document.getElementById('classBar');
  bar.innerHTML='';
  for(const[key,cls]of Object.entries(CLASS_DATA)){
    const btn=document.createElement('div');
    btn.className='class-btn'+(key===currentClass?' active':'');
    btn.title=cls.name;
    btn.innerHTML=`<img src="${ICON_CDN}${cls.icon}.jpg" alt="${cls.name}">`;
    btn.onclick=()=>{currentClass=key;loadClass(key);};
    bar.appendChild(btn);
  }
}

function loadClass(key){
  const cls=CLASS_DATA[key];
  pointsSpent=cls.trees.map(t=>t.talents.map(()=>0));
  document.querySelectorAll('.class-btn').forEach((b,i)=>{
    b.classList.toggle('active',Object.keys(CLASS_DATA)[i]===key);
  });
  decodeBuild();
  renderControls();
  renderTrees();
}

function totalPoints(){return pointsSpent.reduce((s,t)=>s+t.reduce((a,b)=>a+b,0),0);}
function treePoints(ti){return pointsSpent[ti].reduce((a,b)=>a+b,0);}

function renderControls(){
  const cls=CLASS_DATA[currentClass];
  const tp=totalPoints();
  const ct=document.getElementById('controls');
  ct.innerHTML=`
    <div class="class-name" style="color:${cls.color}">${cls.name}</div>
    <div class="points-display">Points: <span>${tp}</span> / ${MAX_POINTS}
      &nbsp;(${cls.trees.map((t,i)=>`${t.name}: ${treePoints(i)}`).join(' / ')})</div>
    <button class="btn" onclick="resetAll()">✕ Reset All</button>
    <button class="btn share-btn" onclick="openShare()">⚔ Share Build</button>`;
}

function renderTrees(){
  const cls=CLASS_DATA[currentClass];
  const wrap=document.getElementById('treesWrap');
  wrap.innerHTML='';
  cls.trees.forEach((tree,ti)=>{
    const panel=document.createElement('div');
    panel.className='tree-panel';
    let header=`<div class="tree-header"><div class="tree-name"><img class="tree-icon" src="${ICON_CDN}${tree.icon}.jpg" alt="">${tree.name}</div><div class="tree-points">${treePoints(ti)} points</div></div>`;
    const treeBgImg=TREE_IMAGES[currentClass]?.[ti];
    const bgStyle=treeBgImg?`background-image:url('/images/talents/${treeBgImg}')`:''; 
    if(tree.talents.length===0){
      panel.innerHTML=header+`<div class="tree-body" style="${bgStyle}"><div class="coming-soon">Coming Soon</div></div>`;
      wrap.appendChild(panel);return;
    }
    const maxRow=Math.max(...tree.talents.map(t=>t.row));
    const gridH=(maxRow+1)*56;
    let gridHTML=`<div class="tree-body" style="${bgStyle}"><div class="tree-grid" style="grid-template-rows:repeat(${maxRow+1},48px);" data-tree="${ti}">`;
    gridHTML+=`<svg class="tree-arrows" viewBox="0 0 ${4*56} ${gridH}" preserveAspectRatio="xMidYMid meet" style="width:${4*56}px;height:${gridH}px;"></svg>`;
    tree.talents.forEach((tal,idx)=>{
      const st=getTalentState(ti,idx);
      const rk=pointsSpent[ti][idx];
      const gs=`grid-row:${tal.row+1};grid-column:${tal.col+1};`;
      gridHTML+=`<div class="talent-cell" style="${gs}">`;
      gridHTML+=`<div class="talent ${st}" data-ti="${ti}" data-idx="${idx}"
        oncontextmenu="event.preventDefault();onTalentClick(event,${ti},${idx})"
        onclick="onTalentClick(event,${ti},${idx})"
        onmouseenter="showTooltip(event,${ti},${idx})"
        onmouseleave="hideTooltip()"
        onmousemove="moveTooltip(event)">`;
      gridHTML+=`<img src="${ICON_CDN}${tal.icon}.jpg" alt="${tal.name}">`;
      if(rk>0)gridHTML+=`<div class="talent-rank">${rk}/${tal.maxRank}</div>`;
      gridHTML+=`</div></div>`;
    });
    gridHTML+=`</div></div>`;
    panel.innerHTML=header+gridHTML;
    wrap.appendChild(panel);
  });
  requestAnimationFrame(drawAllArrows);
}

function getTalentState(ti,idx){
  const cls=CLASS_DATA[currentClass];
  const tal=cls.trees[ti].talents[idx];
  const rk=pointsSpent[ti][idx];
  const tp=treePoints(ti);
  const tierReq=tal.row*POINTS_PER_TIER;
  if(tal.requires!==null){
    const req=cls.trees[ti].talents[tal.requires];
    if(pointsSpent[ti][tal.requires]<req.maxRank){
      return rk>0?'has-points':'locked';
    }
  }
  if(tp<tierReq)return rk>0?'has-points':'locked';
  if(rk>=tal.maxRank)return'maxed';
  if(rk>0)return'has-points';
  if(totalPoints()>=MAX_POINTS)return'locked';
  return'available';
}

function canRemovePoint(ti,idx){
  const cls=CLASS_DATA[currentClass];
  const tree=cls.trees[ti];
  const tal=tree.talents[idx];
  if(pointsSpent[ti][idx]<=0)return false;
  const simSpent=[...pointsSpent[ti]];
  simSpent[idx]--;
  for(let i=0;i<tree.talents.length;i++){
    if(simSpent[i]<=0)continue;
    const t=tree.talents[i];
    const tierReq=t.row*POINTS_PER_TIER;
    let below=0;for(let j=0;j<tree.talents.length;j++){if(tree.talents[j].row<t.row)below+=simSpent[j];}
    if(below<tierReq)return false;
    if(t.requires!==null&&simSpent[t.requires]<tree.talents[t.requires].maxRank)return false;
  }
  return true;
}

function onTalentClick(e,ti,idx){
  const st=getTalentState(ti,idx);
  if(e.type==='click'){
    if(st==='available'||st==='has-points'){
      if(totalPoints()<MAX_POINTS&&pointsSpent[ti][idx]<CLASS_DATA[currentClass].trees[ti].talents[idx].maxRank){
        pointsSpent[ti][idx]++;
      }
    }
  }else{
    if(canRemovePoint(ti,idx)){pointsSpent[ti][idx]--;}
  }
  renderControls();
  renderTrees();
  updateUrl();
}

function drawAllArrows(){
  document.querySelectorAll('.tree-grid').forEach(grid=>{
    const ti=parseInt(grid.dataset.tree);
    const svg=grid.querySelector('svg');
    if(!svg)return;
    svg.innerHTML='';
    const cls=CLASS_DATA[currentClass];
    const tree=cls.trees[ti];
    tree.talents.forEach((tal,idx)=>{
      if(tal.requires===null)return;
      const from=tree.talents[tal.requires];
      const met=pointsSpent[ti][tal.requires]>=from.maxRank;
      const color=met?'#1eff00':'#555';
      const fx=from.col*56+24,fy=from.row*56+48;
      const tx=tal.col*56+24,ty=tal.row*56;
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      if(from.col===tal.col){
        const line=document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1',fx);line.setAttribute('y1',fy);
        line.setAttribute('x2',tx);line.setAttribute('y2',ty-6);
        line.setAttribute('stroke',color);line.setAttribute('stroke-width','3');
        g.appendChild(line);
      }else{
        const my=fy+(ty-fy)/2;
        const poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
        poly.setAttribute('points',`${fx},${fy} ${fx},${my} ${tx},${my} ${tx},${ty-6}`);
        poly.setAttribute('stroke',color);poly.setAttribute('stroke-width','3');
        poly.setAttribute('fill','none');poly.setAttribute('stroke-linejoin','round');
        g.appendChild(poly);
      }
      const ah=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      ah.setAttribute('points',`${tx-5},${ty-7} ${tx+5},${ty-7} ${tx},${ty}`);
      ah.setAttribute('fill',color);
      g.appendChild(ah);
      svg.appendChild(g);
    });
  });
}

function showTooltip(e,ti,idx){
  const cls=CLASS_DATA[currentClass];
  const tal=cls.trees[ti].talents[idx];
  const rk=pointsSpent[ti][idx];
  const st=getTalentState(ti,idx);
  const tt=document.getElementById('tooltip');
  const inner=tt.querySelector('.tt-inner');
  let html=`<div class="tt-name">${tal.name}</div>`;
  html+=`<div class="tt-rank">Rank ${rk}/${tal.maxRank}</div>`;
  html+=`<div class="tt-sep"></div>`;
  if(rk>0){
    html+=`<div class="tt-desc">${tal.desc[rk-1]}</div>`;
    if(rk<tal.maxRank){html+=`<div class="tt-sep"></div><div class="tt-next">Next rank: ${tal.desc[rk]}</div>`;}
  }else{
    html+=`<div class="tt-desc">${tal.desc[0]}</div>`;
  }
  if(tal.requires!==null){
    const req=cls.trees[ti].talents[tal.requires];
    if(pointsSpent[ti][tal.requires]<req.maxRank){
      html+=`<div class="tt-req">Requires ${req.maxRank} points in ${req.name}</div>`;
    }
  }
  if(st==='locked'){
    const tierReq=tal.row*POINTS_PER_TIER;
    const tp=treePoints(ti);
    if(tp<tierReq)html+=`<div class="tt-req">Requires ${tierReq} points in ${cls.trees[ti].name}</div>`;
  }
  html+=`<div class="tt-sep"></div>`;
  html+=`<div class="tt-hint">Left-click to learn, Right-click to unlearn</div>`;
  inner.innerHTML=html;
  tt.style.display='block';
  moveTooltip(e);
}

function moveTooltip(e){
  const tt=document.getElementById('tooltip');
  let x=e.clientX+15,y=e.clientY+15;
  const r=tt.getBoundingClientRect();
  if(x+r.width>window.innerWidth)x=e.clientX-r.width-10;
  if(y+r.height>window.innerHeight)y=e.clientY-r.height-10;
  tt.style.left=x+'px';tt.style.top=y+'px';
}

function hideTooltip(){document.getElementById('tooltip').style.display='none';}

function encodeBuild(){
  const cls=CLASS_DATA[currentClass];
  let parts=[currentClass];
  cls.trees.forEach((tree,ti)=>{
    let s=pointsSpent[ti].map(v=>v.toString()).join('');
    s=s.replace(/0+$/,'');
    parts.push(s||'0');
  });
  return parts.join('-');
}

function decodeBuild(){
  const hash=location.hash.slice(1);
  if(!hash)return;
  const parts=hash.split('-');
  if(parts[0]!==currentClass)return;
  const cls=CLASS_DATA[currentClass];
  cls.trees.forEach((tree,ti)=>{
    const str=parts[ti+1]||'';
    tree.talents.forEach((tal,idx)=>{
      const v=parseInt(str[idx]||'0');
      pointsSpent[ti][idx]=Math.min(v,tal.maxRank);
    });
  });
}

function updateUrl(){location.hash=encodeBuild();}

function resetAll(){
  const cls=CLASS_DATA[currentClass];
  pointsSpent=cls.trees.map(t=>t.talents.map(()=>0));
  renderControls();renderTrees();updateUrl();
}

function openShare(){
  updateUrl();
  document.getElementById('shareUrl').value=location.href;
  document.getElementById('shareOverlay').classList.add('open');
}
function closeShare(){document.getElementById('shareOverlay').classList.remove('open');}
function copyShareUrl(){
  const inp=document.getElementById('shareUrl');
  inp.select();navigator.clipboard.writeText(inp.value).then(()=>{
    const btn=document.querySelector('.share-box .share-btn');
    btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy URL',1500);
  });
}
