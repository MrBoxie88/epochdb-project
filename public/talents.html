<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpochDB — Talent Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --gold:#c8a84b;--gold-light:#e8cc7a;--gold-dark:#8a6f2e;
            --gold-bg:rgba(200,168,75,0.06);--red:#8b1a1a;--red-bright:#c0392b;
            --bg-deep:#0a0a0c;--bg-panel:#0f0f14;--bg-card:#131318;--bg-hover:#1a1a24;
            --border:#252530;--border-gold:#3a2e10;
            --text:#c8c0a8;--text-dim:#6a6458;--text-bright:#e8dfc8;
        }
        html{font-size:13px}
        body{background:var(--bg-deep);color:var(--text);font-family:'Crimson Text',Georgia,serif;min-height:100vh;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
        a{color:var(--gold);text-decoration:none;cursor:pointer}a:hover{color:var(--gold-light);text-decoration:underline}
        button{cursor:pointer;font-family:inherit}
        ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg-deep)}::-webkit-scrollbar-thumb{background:var(--border-gold);border-radius:2px}

        /* ── TOPBAR ── */
        #topbar{background:linear-gradient(180deg,#0d0d10 0%,rgba(10,10,12,.95) 100%);border-bottom:1px solid var(--border-gold);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:200;backdrop-filter:blur(14px);height:52px}
        .logo{display:flex;align-items:center;gap:.7rem;flex-shrink:0;cursor:pointer;text-decoration:none}
        .logo-icon{width:36px;height:36px}.logo-icon svg{width:100%;height:100%}
        .logo-text{font-family:'Cinzel',serif;font-weight:900;font-size:1.15rem;letter-spacing:.15em;color:var(--gold);text-shadow:0 0 18px rgba(200,168,75,.4);line-height:1}
        .logo-sub{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.3em;color:var(--text-dim);margin-top:2px}
        .topnav{display:flex;gap:.1rem;margin-left:auto;align-items:center;flex-shrink:0}
        .tnav-btn{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;color:var(--text-dim);background:none;border:none;padding:.4rem .75rem;transition:color .15s;text-transform:uppercase}
        .tnav-btn:hover,.tnav-btn.active{color:var(--gold)}

        /* ── PAGE ── */
        #page{max-width:1200px;margin:0 auto;padding:1.2rem 1.5rem 3rem;position:relative;z-index:1}

        /* ── CLASS SELECTOR ── */
        .class-bar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:1.2rem;background:var(--bg-panel);border:1px solid var(--border);padding:.5rem}
        .class-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .7rem;border:1px solid transparent;background:none;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;transition:all .15s;white-space:nowrap;border-radius:2px}
        .class-btn:hover{color:var(--text-bright);background:var(--bg-hover)}
        .class-btn.active{border-color:var(--border-gold);background:var(--gold-bg)}
        .class-btn-icon{width:22px;height:22px;border-radius:2px;border:1px solid rgba(255,255,255,.12);object-fit:cover}

        /* ── CONTROLS ── */
        .controls{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
        .points-display{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--gold)}
        .points-display .total{font-size:1.3rem;text-shadow:0 0 10px rgba(200,168,75,.3)}
        .level-display{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--text-dim)}
        .ctrl-btn{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);padding:.4rem .8rem;transition:all .15s;text-transform:uppercase}
        .ctrl-btn:hover{border-color:var(--gold-dark);color:var(--gold)}
        .ctrl-btn.primary{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--bg-deep);border:none;font-weight:600}
        .ctrl-btn.primary:hover{filter:brightness(1.12)}

        /* ── TREES CONTAINER ── */
        .trees-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:start}
        @media(max-width:900px){.trees-wrap{grid-template-columns:1fr}}

        /* ── SINGLE TREE ── */
        .tree-panel{background:var(--bg-panel);border:1px solid var(--border);overflow:hidden;min-width:0}
        .tree-header{display:flex;align-items:center;gap:.6rem;padding:.55rem .9rem;border-bottom:1px solid var(--border);background:var(--bg-card)}
        .tree-header-icon{width:28px;height:28px;border-radius:3px;border:1px solid rgba(255,255,255,.15);object-fit:cover}
        .tree-header-name{font-family:'Cinzel',serif;font-size:.78rem;font-weight:600;color:var(--text-bright);flex:1}
        .tree-header-pts{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--gold)}
        .tree-reset{font-size:.6rem;background:none;border:none;color:var(--text-dim);font-family:'Cinzel',serif;letter-spacing:.08em;padding:.2rem .5rem;transition:color .15s}
        .tree-reset:hover{color:var(--red-bright)}

        .tree-body{padding:16px;position:relative;overflow:hidden}
        .tree-body::before{content:'';position:absolute;inset:0;opacity:.06;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 30%,var(--tree-color,#333) 0%,transparent 70%)}

        .tree-grid{display:grid;grid-template-columns:repeat(4,42px);grid-template-rows:repeat(var(--rows,7),42px);gap:8px;justify-content:center;position:relative;z-index:1}

        /* ── TALENT ICON ── */
        .talent{width:42px;height:42px;position:relative;border-radius:3px;cursor:pointer;transition:all .12s;border:2px solid #333;background:#0a0812;display:flex;align-items:center;justify-content:center;user-select:none}
        .talent img{width:100%;height:100%;border-radius:2px;object-fit:cover;pointer-events:none;filter:saturate(.3) brightness(.5)}
        .talent.available{border-color:#555}
        .talent.available img{filter:saturate(.8) brightness(.85)}
        .talent.has-points{border-color:var(--gold);box-shadow:0 0 6px rgba(200,168,75,.3)}
        .talent.has-points img{filter:saturate(1) brightness(1)}
        .talent.maxed{border-color:#1eff00;box-shadow:0 0 8px rgba(30,255,0,.35)}
        .talent.maxed img{filter:saturate(1.1) brightness(1.1)}
        .talent.locked{opacity:.45;cursor:not-allowed}
        .talent:hover:not(.locked){transform:scale(1.08);z-index:5}

        .talent-rank{position:absolute;bottom:-1px;right:-1px;font-family:'Share Tech Mono',monospace;font-size:.62rem;min-width:16px;text-align:center;padding:0 2px;line-height:14px;border-radius:2px 0;color:var(--gold-light);background:rgba(0,0,0,.85);border:1px solid #333}
        .talent.has-points .talent-rank{border-color:var(--gold-dark);color:var(--gold-light)}
        .talent.maxed .talent-rank{border-color:#1a6b1a;color:#1eff00;background:rgba(0,30,0,.9)}

        /* ── DEPENDENCY ARROWS ── */
        .tree-arrows{position:absolute;inset:0;pointer-events:none;z-index:0}
        .tree-arrows line{stroke:var(--gold-dark);stroke-width:2}
        .tree-arrows line.active{stroke:var(--gold);stroke-width:2}
        .tree-arrows line.maxed{stroke:#1eff00;stroke-width:2}

        /* ── TOOLTIP ── */
        #talent-tooltip{position:fixed;z-index:9999;pointer-events:none;display:none;width:260px;filter:drop-shadow(0 4px 24px rgba(0,0,0,.9))}
        #talent-tooltip.visible{display:block}
        .tt-frame{background:#0a0a12;border:1px solid #4a3a1a;position:relative;box-shadow:inset 0 0 0 1px #1a1428,0 0 0 1px #000,0 2px 12px rgba(0,0,0,.8);padding:10px 12px}
        .tt-frame::before,.tt-frame::after{content:'';position:absolute;width:6px;height:6px;border-color:var(--gold-dark);border-style:solid;z-index:1}
        .tt-frame::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
        .tt-frame::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
        .tt-name{font-family:'Crimson Text',serif;font-size:1rem;font-weight:600;color:var(--gold-light);margin-bottom:2px}
        .tt-rank{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text-dim);margin-bottom:6px}
        .tt-sep{height:1px;background:linear-gradient(90deg,transparent,#4a3a1a 20%,#6a5a2a 50%,#4a3a1a 80%,transparent);margin:6px 0}
        .tt-desc{font-size:.85rem;color:#1eff00;line-height:1.5}
        .tt-next{font-size:.82rem;color:#aaa;line-height:1.4;margin-top:4px}
        .tt-next .label{color:var(--text-dim);font-size:.7rem;font-family:'Cinzel',serif;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:2px}
        .tt-req{font-size:.78rem;color:var(--red-bright);margin-top:6px}
        .tt-click{font-size:.68rem;color:var(--text-dim);margin-top:6px;font-style:italic}

        /* ── SHARE MODAL ── */
        .share-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .share-overlay.open{display:flex}
        .share-box{background:var(--bg-panel);border:1px solid var(--border-gold);padding:1.2rem;width:460px;max-width:95vw}
        .share-title{font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.14em;color:var(--gold);margin-bottom:.8rem}
        .share-input{width:100%;background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.8rem;padding:.5rem;outline:none}
        .share-input:focus{border-color:var(--gold-dark)}
        .share-btns{display:flex;gap:.5rem;margin-top:.6rem}

        /* ── EMPTY STATE ── */
        .empty-state{text-align:center;padding:3rem 1rem;color:var(--text-dim)}
        .empty-state .icon{font-size:3rem;margin-bottom:.8rem}
        .empty-state .msg{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.4rem}
        .empty-state .sub{font-size:.9rem;font-style:italic}

        /* ── FOOTER NOTE ── */
        .footer-note{margin-top:2rem;text-align:center;font-size:.82rem;color:var(--text-dim);font-style:italic;padding:1rem;border-top:1px solid var(--border)}
    </style>
</head>
<body>
    <div id="topbar">
        <a class="logo" href="/">
            <div class="logo-icon">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" stroke="#c8a84b" stroke-width="1.5" opacity=".4"/>
                    <path d="M20 4L20 36M4 20L36 20" stroke="#c8a84b" stroke-width="1" opacity=".25"/>
                    <path d="M20 8L24 14L30 14L25 18L27 25L20 21L13 25L15 18L10 14L16 14Z" fill="#c8a84b" opacity=".85"/>
                    <circle cx="20" cy="20" r="3" fill="#8b1a1a"/>
                </svg>
            </div>
            <div><div class="logo-text">EPOCHDB</div><div class="logo-sub">Talent Calculator</div></div>
        </a>
        <div class="topnav">
            <a class="tnav-btn" href="/">Database</a>
            <span class="tnav-btn active">Talents</span>
        </div>
    </div>

    <div id="page">
        <div class="class-bar" id="class-bar"></div>
        <div class="controls" id="controls"></div>
        <div class="trees-wrap" id="trees-wrap"></div>
        <div class="footer-note">Talent data is community-sourced for Project Epoch. Click talents to allocate points, right-click to remove. <a href="/">← Back to EpochDB</a></div>
    </div>

    <div id="talent-tooltip"><div class="tt-frame" id="tt-inner"></div></div>

    <div class="share-overlay" id="share-overlay">
        <div class="share-box">
            <div class="share-title">🔗 Share Build</div>
            <input class="share-input" id="share-url" readonly onclick="this.select()">
            <div class="share-btns">
                <button class="ctrl-btn primary" onclick="copyShareUrl()">Copy Link</button>
                <button class="ctrl-btn" onclick="closeShare()">Close</button>
            </div>
        </div>
    </div>

<script>
// ═══════════════════════════════════════════════════════════════

// Add/edit talent data here. Each class has 3 trees.

// STATE
// ═══════════════════════════════════════════════════════════════
let selectedClass = 'warrior';
// points[treeIndex][talentIndex] = currentRank
let points = [[], [], []];

function totalPoints() { return points.flat().reduce((s, v) => s + v, 0); }
function treePoints(ti) { return points[ti].reduce((s, v) => s + v, 0); }
function remainingPoints() { return MAX_POINTS - totalPoints(); }

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════
function renderClassBar() {
    const bar = document.getElementById('class-bar');
    bar.innerHTML = Object.entries(CLASS_DATA).map(([key, cls]) =>
        `<button class="class-btn ${key === selectedClass ? 'active' : ''}" onclick="selectClass('${key}')" style="${key === selectedClass ? 'color:'+cls.color+';border-color:'+cls.color : ''}">
            <img class="class-btn-icon" src="${ICON_CDN}${cls.icon}.jpg" onerror="this.style.display='none'" alt="">
            <span>${cls.name}</span>
        </button>`
    ).join('');
}

function renderControls() {
    const cls = CLASS_DATA[selectedClass];
    const tp = totalPoints();
    const reqLevel = tp > 0 ? 9 + tp : 10;
    document.getElementById('controls').innerHTML = `
        <div>
            <div class="points-display">Points: <span class="total">${tp}</span> / ${MAX_POINTS}
                <span style="margin-left:.8rem;font-size:.8rem;color:var(--text-dim)">Remaining: ${remainingPoints()}</span>
            </div>
            <div class="level-display">Required Level: ${reqLevel}</div>
        </div>
        <div style="display:flex;gap:.4rem;flex-wrap:wrap">
            <button class="ctrl-btn" onclick="resetAll()">Reset All</button>
            <button class="ctrl-btn primary" onclick="openShare()">🔗 Share Build</button>
        </div>`;
}

function renderTrees() {
    const cls = CLASS_DATA[selectedClass];
    const wrap = document.getElementById('trees-wrap');
    if (!cls) { wrap.innerHTML = ''; return; }

    wrap.innerHTML = cls.trees.map((tree, ti) => {
        if (!tree.talents.length) {
            return `<div class="tree-panel">
                <div class="tree-header" style="--tree-color:${cls.color}">
                    <img class="tree-header-icon" src="${ICON_CDN}${tree.icon}.jpg" onerror="this.style.display='none'" alt="">
                    <span class="tree-header-name">${tree.name}</span>
                    <span class="tree-header-pts">0</span>
                </div>
                <div class="empty-state">
                    <div class="icon">🔮</div>
                    <div class="msg">Coming Soon</div>
                    <div class="sub">Talent data for ${cls.name} ${tree.name} is being collected.</div>
                </div>
            </div>`;
        }
        const maxRow = Math.max(...tree.talents.map(t => t.row));
        const rows = maxRow + 1;
        const tp = treePoints(ti);

        let gridHtml = tree.talents.map((talent, idx) => {
            const rank = points[ti][idx] || 0;
            const state = getTalentState(ti, idx);
            return `<div class="talent ${state}" style="grid-row:${talent.row+1};grid-column:${talent.col+1}"
                    data-tree="${ti}" data-idx="${idx}"
                    onmousedown="onTalentClick(event,${ti},${idx})"
                    onmouseover="showTooltip(event,${ti},${idx})"
                    onmouseout="hideTooltip()"
                    oncontextmenu="return false">
                <img src="${ICON_CDN}${talent.icon}.jpg" onerror="this.parentElement.textContent='?'" alt="${talent.name}">
                <span class="talent-rank">${rank}/${talent.maxRank}</span>
            </div>`;
        }).join('');

        return `<div class="tree-panel">
            <div class="tree-header">
                <img class="tree-header-icon" src="${ICON_CDN}${tree.icon}.jpg" onerror="this.style.display='none'" alt="">
                <span class="tree-header-name">${tree.name}</span>
                <span class="tree-header-pts" style="color:${cls.color}">${tp}</span>
                <button class="tree-reset" onclick="resetTree(${ti})">Reset</button>
            </div>
            <div class="tree-body" style="--tree-color:${cls.color}">
                <svg class="tree-arrows" id="arrows-${ti}"></svg>
                <div class="tree-grid" style="--rows:${rows}">${gridHtml}</div>
            </div>
        </div>`;
    }).join('');

    // Draw dependency arrows after DOM update
    requestAnimationFrame(drawAllArrows);
}

function getTalentState(ti, idx) {
    const cls = CLASS_DATA[selectedClass];
    const tree = cls.trees[ti];
    const talent = tree.talents[idx];
    const rank = points[ti][idx] || 0;
    const tp = treePoints(ti);

    // Tier check: need row * POINTS_PER_TIER points in tree
    if (tp < talent.row * POINTS_PER_TIER && rank === 0) return 'locked';

    // Prerequisite check
    if (talent.requires != null) {
        const reqTalent = tree.talents[talent.requires];
        const reqRank = points[ti][talent.requires] || 0;
        if (reqRank < reqTalent.maxRank && rank === 0) return 'locked';
    }

    if (rank >= talent.maxRank) return 'maxed';
    if (rank > 0) return 'has-points';
    return 'available';
}

function canRemovePoint(ti, idx) {
    const cls = CLASS_DATA[selectedClass];
    const tree = cls.trees[ti];
    const rank = points[ti][idx] || 0;
    if (rank <= 0) return false;

    // Simulate removing the point
    const simPoints = points[ti].slice();
    simPoints[idx]--;
    const simTreeTotal = simPoints.reduce((s, v) => s + v, 0);
    const talent = tree.talents[idx];

    // Check if any talent in a higher tier would become orphaned
    for (let j = 0; j < tree.talents.length; j++) {
        if (j === idx) continue;
        const t = tree.talents[j];
        const r = simPoints[j] || 0;
        if (r <= 0) continue;
        // Tier requirement
        const pointsBelow = simPoints.reduce((s, v, k) => {
            return s + (tree.talents[k].row < t.row ? v : 0);
        }, 0);
        // Need at least row * 5 points in rows BELOW this talent's row
        // Actually, WoW uses total tree points, not points below
        if (simTreeTotal < t.row * POINTS_PER_TIER) return false;
        // Prerequisite check
        if (t.requires != null && t.requires === idx) {
            if (simPoints[idx] < tree.talents[idx].maxRank && r > 0) {
                // Dependent talent still has points but prerequisite is no longer maxed
                // Actually: requires means you need the prerequisite at max rank
                if (simPoints[idx] < tree.talents[idx].maxRank) return false;
            }
        }
    }
    return true;
}

// ═══════════════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════════════
function onTalentClick(e, ti, idx) {
    e.preventDefault();
    const cls = CLASS_DATA[selectedClass];
    const tree = cls.trees[ti];
    const talent = tree.talents[idx];

    if (e.button === 0) { // Left click — add point
        const state = getTalentState(ti, idx);
        if (state === 'locked' || state === 'maxed') return;
        if (remainingPoints() <= 0) return;
        if (!points[ti][idx]) points[ti][idx] = 0;
        points[ti][idx]++;
    } else if (e.button === 2) { // Right click — remove point
        if (!canRemovePoint(ti, idx)) return;
        points[ti][idx]--;
    }

    renderTrees();
    renderControls();
    updateUrl();
}

function resetTree(ti) {
    points[ti] = [];
    renderTrees();
    renderControls();
    updateUrl();
}

function resetAll() {
    points = [[], [], []];
    renderTrees();
    renderControls();
    updateUrl();
}

function selectClass(key) {
    selectedClass = key;
    points = [[], [], []];
    renderClassBar();
    renderControls();
    renderTrees();
    updateUrl();
}

// ═══════════════════════════════════════════════════════════════
// DEPENDENCY ARROWS
// ═══════════════════════════════════════════════════════════════
function drawAllArrows() {
    const cls = CLASS_DATA[selectedClass];
    if (!cls) return;
    cls.trees.forEach((tree, ti) => {
        const svg = document.getElementById(`arrows-${ti}`);
        if (!svg) return;
        const grid = svg.parentElement.querySelector('.tree-grid');
        if (!grid) return;
        const gridRect = grid.getBoundingClientRect();
        const svgRect = svg.parentElement.getBoundingClientRect();
        svg.setAttribute('width', svgRect.width);
        svg.setAttribute('height', svgRect.height);
        let lines = '';
        tree.talents.forEach((talent, idx) => {
            if (talent.requires == null) return;
            const reqTalent = tree.talents[talent.requires];
            const fromEl = grid.querySelector(`[data-idx="${talent.requires}"]`);
            const toEl = grid.querySelector(`[data-idx="${idx}"]`);
            if (!fromEl || !toEl) return;
            const fRect = fromEl.getBoundingClientRect();
            const tRect = toEl.getBoundingClientRect();
            const x1 = fRect.left + fRect.width / 2 - svgRect.left;
            const y1 = fRect.bottom - svgRect.top;
            const x2 = tRect.left + tRect.width / 2 - svgRect.left;
            const y2 = tRect.top - svgRect.top;
            const reqRank = points[ti][talent.requires] || 0;
            const isActive = reqRank >= reqTalent.maxRank;
            const cls2 = isActive ? ((points[ti][idx] || 0) >= talent.maxRank ? 'maxed' : 'active') : '';
            if (Math.abs(x1 - x2) < 2) {
                lines += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" class="${cls2}"/>`;
            } else {
                const midY = (y1 + y2) / 2;
                lines += `<line x1="${x1}" y1="${y1}" x2="${x1}" y2="${midY}" class="${cls2}"/>`;
                lines += `<line x1="${x1}" y1="${midY}" x2="${x2}" y2="${midY}" class="${cls2}"/>`;
                lines += `<line x1="${x2}" y1="${midY}" x2="${x2}" y2="${y2}" class="${cls2}"/>`;
            }
        });
        svg.innerHTML = lines;
    });
}

window.addEventListener('resize', () => requestAnimationFrame(drawAllArrows));

// ═══════════════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════════════
const ttEl = document.getElementById('talent-tooltip');
const ttIn = document.getElementById('tt-inner');

function showTooltip(e, ti, idx) {
    const cls = CLASS_DATA[selectedClass];
    const tree = cls.trees[ti];
    const talent = tree.talents[idx];
    const rank = points[ti][idx] || 0;
    const state = getTalentState(ti, idx);

    let html = `<div class="tt-name">${talent.name}</div>`;
    html += `<div class="tt-rank">Rank ${rank}/${talent.maxRank}</div>`;

    if (talent.requires != null) {
        const reqT = tree.talents[talent.requires];
        const reqR = points[ti][talent.requires] || 0;
        if (reqR < reqT.maxRank) {
            html += `<div class="tt-req">Requires ${reqT.maxRank} points in ${reqT.name}</div>`;
        }
    }
    if (state === 'locked' && talent.requires == null) {
        html += `<div class="tt-req">Requires ${talent.row * POINTS_PER_TIER} points in ${tree.name}</div>`;
    }

    html += `<div class="tt-sep"></div>`;
    if (rank > 0) {
        html += `<div class="tt-desc">${talent.desc[rank - 1]}</div>`;
    }
    if (rank < talent.maxRank) {
        const label = rank > 0 ? 'Next Rank:' : '';
        html += `<div class="tt-next">${label ? `<span class="label">${label}</span>` : ''}${talent.desc[rank]}</div>`;
    }

    html += `<div class="tt-click">${state === 'locked' ? '' : 'Left-click to learn, right-click to unlearn.'}</div>`;

    ttIn.innerHTML = html;
    ttEl.classList.add('visible');
    positionTooltip(e);
}

function hideTooltip() {
    ttEl.classList.remove('visible');
}

function positionTooltip(e) {
    const tw = ttEl.offsetWidth || 260;
    const th = ttEl.offsetHeight || 200;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let left = e.clientX + 16;
    let top = e.clientY + 8;
    if (left + tw > vw - 8) left = e.clientX - tw - 8;
    if (top + th > vh - 8) top = vh - th - 8;
    if (top < 4) top = 4;
    ttEl.style.left = left + 'px';
    ttEl.style.top = top + 'px';
}

document.addEventListener('mousemove', e => {
    if (ttEl.classList.contains('visible')) positionTooltip(e);
});

// ═══════════════════════════════════════════════════════════════
// URL SHARING
// ═══════════════════════════════════════════════════════════════
function encodeBuild() {
    const cls = CLASS_DATA[selectedClass];
    const parts = cls.trees.map((tree, ti) => {
        if (!tree.talents.length) return '';
        return tree.talents.map((t, idx) => points[ti][idx] || 0).join('');
    });
    // Trim trailing zeros
    const trimmed = parts.map(p => p.replace(/0+$/, '') || '0');
    return `${selectedClass}-${trimmed.join('-')}`;
}

function decodeBuild(hash) {
    const parts = hash.split('-');
    if (parts.length < 2) return false;
    const classKey = parts[0];
    if (!CLASS_DATA[classKey]) return false;
    selectedClass = classKey;
    points = [[], [], []];
    const cls = CLASS_DATA[classKey];
    for (let ti = 0; ti < 3; ti++) {
        const str = parts[ti + 1] || '';
        const tree = cls.trees[ti];
        if (!tree || !tree.talents.length) continue;
        for (let i = 0; i < tree.talents.length; i++) {
            const v = parseInt(str[i]) || 0;
            points[ti][i] = Math.min(v, tree.talents[i].maxRank);
        }
    }
    return true;
}

function updateUrl() {
    const build = encodeBuild();
    history.replaceState(null, '', '#' + build);
}

function openShare() {
    const url = window.location.origin + window.location.pathname + '#' + encodeBuild();
    document.getElementById('share-url').value = url;
    document.getElementById('share-overlay').classList.add('open');
}

function closeShare() {
    document.getElementById('share-overlay').classList.remove('open');
}

function copyShareUrl() {
    const input = document.getElementById('share-url');
    input.select();
    navigator.clipboard.writeText(input.value).then(() => {
        const btn = document.querySelector('.share-btns .primary');
        btn.textContent = '✔ Copied!';
        setTimeout(() => { btn.textContent = 'Copy Link'; }, 1500);
    });
}

document.getElementById('share-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeShare();
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function init() {
    // Load from URL hash
    const hash = window.location.hash.slice(1);
    if (hash) decodeBuild(hash);

    renderClassBar();
    renderControls();
    renderTrees();
}

window.addEventListener('hashchange', () => {
    const hash = window.location.hash.slice(1);
    if (hash && decodeBuild(hash)) {
        renderClassBar();
        renderControls();
        renderTrees();
    }
});

init();
</script>
